services:
  # 1. THE MARIA DB DATABASE (Private Service)
  - type: pserv
    name: romm-db
    runtime: image
    image:
      url: docker.io/library/mariadb:10.11
    plan: starter
    disk:
      name: mariadb-data
      mountPath: /var/lib/mysql
      sizeGB: 5
    envVars:
      - key: MARIADB_ROOT_PASSWORD
        generateValue: true
      - key: MARIADB_DATABASE
        value: romm
      - key: MARIADB_USER
        value: romm
      - key: MARIADB_PASSWORD
        generateValue: true

  # 2. THE REDIS CACHE (Required for RomM v3+)
  - type: keyvalue
    name: romm-cache
    plan: free
    ipAllowList: []

  # 3. THE ROMM WEB SERVER
  - type: web
    name: romm-server
    runtime: image
    image:
      url: ghcr.io/rommapp/romm:latest
    plan: starter
    disk:
      name: romm-persistent-data
      mountPath: /romm_data # This path MUST be unique to avoid 404s
      sizeGB: 15
    envVars:
      # DATABASE HANDSHAKE
      - key: DB_HOST
        fromService:
          type: pserv
          name: romm-db
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: romm-db
          property: port
      - key: DB_NAME
        value: romm
      - key: DB_USER
        value: romm
      - key: DB_PASSWD
        fromService:
          type: pserv
          name: romm-db
          envVarKey: MARIADB_PASSWORD
      
      # REDIS HANDSHAKE
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: romm-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: romm-cache
          property: port

      # ROMM SPECIFIC CONFIG
      - key: ROMM_DB_DRIVER
        value: mariadb
      - key: ROMM_AUTH_SECRET_KEY
        generateValue: true
      - key: ROMM_BASE_URL
        value: https://romm-server-6r06.onrender.com
      
      # DATA PATHS (Points to the persistent disk)
      - key: ROMM_BASE_PATH
        value: /romm_data/library
      - key: ROMM_ASSETS_PATH
        value: /romm_data/assets
      - key: ROMM_CONFIG_PATH
        value: /romm_data/config/config.yaml

      # IGDB CREDENTIALS (Syncing from your Dashboard)
      - key: IGDB_CLIENT_ID
        sync: false 
      - key: IGDB_CLIENT_SECRET
        sync: false