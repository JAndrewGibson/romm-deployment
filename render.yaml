services:
  # 1. The MariaDB Database (Private Service)
  - type: pserv
    name: romm-db
    runtime: image
    image:
      url: docker.io/library/mariadb:10.11
    plan: starter
    disk:
      name: mariadb-data
      mountPath: /var/lib/mysql
      sizeGB: 5
    envVars:
      - key: MARIADB_ROOT_PASSWORD
        generateValue: true
      - key: MARIADB_DATABASE
        value: romm
      - key: MARIADB_USER
        value: romm
      - key: MARIADB_PASSWORD
        generateValue: true

  # 2. The Redis Cache
  - type: redis
    name: romm-cache
    plan: starter
    ipAllowList: []

  # 3. The RomM Web Server
  - type: web
    name: romm-server
    runtime: image
    image:
      url: ghcr.io/rommapp/romm:latest
    plan: starter
    disk:
      name: romm-persistent-data
      mountPath: /romm/resources
      sizeGB: 15
    envVars:
      - key: ROMM_BASE_PATH
        value: /romm/resources/library
      - key: ROMM_BASE_URL
        value: https://romm-server-6r06.onrender.com
      - key: DB_HOST
        fromService:
          type: pserv
          name: romm-db
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: romm-db
          property: port
      - key: DB_NAME
        value: romm
      - key: DB_USER
        value: romm
      - key: DB_PASSWD
        fromService:
          type: pserv
          name: romm-db
          envVarKey: MARIADB_PASSWORD
      - key: REDIS_HOST
        fromService:
          type: redis
          name: romm-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: romm-cache
          property: port
      - key: ROMM_AUTH_SECRET_KEY
        generateValue: true
      - key: IGDB_CLIENT_ID
        sync: false 
      - key: IGDB_CLIENT_SECRET
        sync: false