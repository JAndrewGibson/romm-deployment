services:
  - type: web
    name: romm-server
    runtime: image
    image:
      url: docker.io/rommapp/romm:latest
    plan: starter 
    disk:
      name: romm-persistent-data
      mountPath: /romm
      sizeGB: 15
    envVars:
      - key: ROMM_DB_DRIVER
        value: sqlite
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: romm-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: romm-cache
          property: port
      - key: ROMM_AUTH_SECRET_KEY
        generateValue: true
      - key: IGDB_CLIENT_ID
        sync: false 
      - key: IGDB_CLIENT_SECRET
        sync: false

  - type: keyvalue
    name: romm-cache
    plan: starter 
    ipAllowList: []